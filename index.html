<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MP3 Player" />
    <title>MP3 Player</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Installable iPhone web app</p>
          <h1>MP3 Player</h1>
          <p class="subtext">Import your MP3 files, keep a local playlist, and play them on your iPhone.</p>
        </div>
        <label class="import-button">
          <input id="fileInput" type="file" accept="audio/*,.mp3" multiple hidden />
          Add MP3 files
        </label>
      </header>

      <main class="player-layout">
        <section class="now-playing card">
          <div id="coverArt" class="cover-art" aria-label="Album artwork">
            <img id="coverArtImage" alt="Album artwork for the current track" hidden />
            <div id="coverArtPlaceholder" class="cover-art-placeholder" aria-hidden="true">♪</div>
          </div>
          <div class="track-meta">
            <p class="section-label">Now playing</p>
            <h2 id="trackTitle">No track selected</h2>
            <p id="trackInfo">Import MP3 files to start</p>
          </div>

          <div class="seek-block">
            <input id="seekBar" type="range" min="0" max="100" value="0" step="0.1" />
            <div class="time-row">
              <span id="currentTime">0:00</span>
              <span id="duration">0:00</span>
            </div>
          </div>

          <div class="controls">
            <button id="prevBtn" class="control secondary" type="button">⏮</button>
            <button id="playBtn" class="control primary" type="button">▶</button>
            <button id="nextBtn" class="control secondary" type="button">⏭</button>
          </div>

          <div class="volume-row">
            <label for="volumeBar">Volume</label>
            <input id="volumeBar" type="range" min="0" max="1" step="0.01" value="1" />
          </div>
        </section>

        <section class="playlist card">
          <div class="playlist-header">
            <div>
              <p class="section-label">Playlist</p>
              <h3>Your songs</h3>
            </div>
            <button id="clearBtn" class="ghost-button" type="button">Clear all</button>
          </div>
          <ul id="playlist" class="playlist-list"></ul>
          <p id="emptyState" class="empty-state">No songs yet. Tap <strong>Add MP3 files</strong> to import tracks.</p>
        </section>
      </main>
    </div>

    <audio id="audio"></audio>
    <script src="app.js"></script>
  </body>
</html>
